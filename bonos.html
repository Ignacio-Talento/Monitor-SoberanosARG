<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Bonos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --card: #f8fafc;
    --row-hover: #eef2f7;
    --border: #d1d9e0;
    --border-l: #b8c4cf;
    --text: #1a2332;
    --text-2: #3a4a5c;
    --text-3: #7a8fa0;
    --green: #16a34a;
    --green-bg: #dcfce7;
    --green-border: #86efac;
    --blue: #1d6fa5;
    --amber: #b45309;
    --red: #dc2626;
    --purple: #7c3aed;
    --teal: #0d9488;
    --mono: 'JetBrains Mono','Fira Code','Courier New',monospace;
    --sans: 'Inter',system-ui,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 24px; }
  .wrap { max-width: 1200px; margin: 0 auto; }

  /* HEADER */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); gap: 16px; flex-wrap: wrap; }
  .header-left h1 { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--text-3); text-transform: uppercase; margin-bottom: 4px; }
  .status-line { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-3); font-family: var(--mono); }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.ok { background: var(--green); animation: pulse 2s infinite; }
  .dot.err { background: var(--red); }
  .dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  .dot.idle { background: var(--text-3); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .upload-label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); font-family: var(--mono); cursor: pointer; background: var(--surface); border: 1px solid var(--border-l); border-radius: 5px; padding: 7px 14px; transition: border-color .15s, color .15s; }
  .upload-label:hover { border-color: var(--blue); color: var(--blue); }
  input[type=file] { display: none; }
  .upload-st { font-size: 11px; font-family: var(--mono); color: var(--text-3); }
  .upload-st.ok { color: var(--green); }
  .upload-st.err { color: var(--red); }
  .upload-st.loading { color: var(--amber); }
  .sep-v { width: 1px; height: 20px; background: var(--border); }
  .btn { font-size: 11px; font-family: var(--mono); border-radius: 5px; padding: 7px 14px; cursor: pointer; border: 1px solid; transition: background .15s; white-space: nowrap; }
  .btn-ghost { color: var(--text-3); background: var(--surface); border-color: var(--border); }
  .btn-ghost:hover { background: var(--row-hover); color: var(--text-2); }
  .btn-green { color: #ffffff; background: var(--green); border-color: var(--green); }
  .btn-green:hover { background: #15803d; }
  .btn-green:disabled { opacity: .4; cursor: not-allowed; }

  /* ALERT */
  .alert { padding: 10px 14px; border-radius: 6px; font-size: 11px; font-family: var(--mono); margin-bottom: 14px; display: none; }
  .alert.show { display: block; }
  .alert.err { background:#fef2f2; border:1px solid #fecaca; color:var(--red); }
  .alert.info { background:#f0fdf4; border:1px solid #86efac; color:var(--green); }

  /* TABLA PRINCIPAL */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; overflow-x: auto; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead tr { border-bottom: 2px solid var(--border); }
  th { padding: 10px 14px; font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); text-align: right; white-space: nowrap; background: var(--card); }
  th.th-left { text-align: left; }

  /* FILA DE GRUPO */
  tr.group-header td {
    background: var(--card);
    border-top: 2px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .10em;
    text-transform: uppercase;
    color: var(--text-3);
    font-family: var(--mono);
  }
  tr.group-header:first-child td { border-top: none; }

  /* FILAS NORMALES */
  tbody tr.data-row { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr.data-row:hover { background: var(--row-hover); }
  td { padding: 8px 14px; font-size: 12px; text-align: right; color: var(--text-2); white-space: nowrap; font-family: var(--mono); vertical-align: middle; }
  td.td-ticker { text-align: left; font-weight: 600; color: var(--text); min-width: 90px; }
  td.td-nombre { text-align: left; color: var(--text-2); font-size: 11px; min-width: 160px; font-family: var(--sans); }

  .no-p { color: var(--text-3); font-style: italic; font-size: 11px; }
  .val-green { color: var(--green); font-weight: 500; }
  .val-blue  { color: var(--blue);  font-weight: 500; }
  .val-amber { color: var(--amber); font-weight: 500; }
  .val-teal  { color: var(--teal);  font-weight: 500; }
  .val-purple{ color: var(--purple);font-weight: 500; }
  .val-red   { color: var(--red);   font-weight: 600; }

  /* INPUT PRECIO EN TABLA */
  .precio-cell-input {
    background: var(--bg); border: 1px solid var(--border-l); border-radius: 4px;
    color: var(--text-2); font-family: var(--mono); font-size: 12px;
    text-align: right; width: 90px; padding: 3px 6px;
    transition: border-color .15s, color .15s;
  }
  .precio-cell-input:focus { outline: none; border-color: var(--blue); color: var(--text); }
  .precio-cell-input.has-value { color: var(--green); border-color: var(--green-border); background: var(--green-bg); }
  .precio-cell-input::placeholder { color: var(--text-3); font-size: 11px; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; appearance: textfield; }

  .empty-state { padding: 40px; text-align: center; color: var(--text-3); font-size: 12px; font-family: var(--mono); font-style: italic; }

  @media (max-width: 768px) { body { padding: 12px; } }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-left">
      <h1>Monitor Bonos · Renta Fija AR</h1>
      <div class="status-line">
        <span class="dot idle" id="dot"></span>
        <span id="status-txt">Cargá el Excel para comenzar</span>
      </div>
    </div>
  </div>

  <div class="alert" id="alert"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="btn btn-green" onclick="fetchPreciosYahoo()" id="btn-yahoo">↻ Actualizar precios</button>
    <span class="upload-st" id="yahoo-st"></span>
    <div class="sep-v"></div>
    <label class="upload-label" for="xlsx-input">📊 Cargar Instrumentos.xlsx</label>
    <input type="file" id="xlsx-input" accept=".xlsx,.xls" onchange="cargarExcelManual(this)">
    <span class="upload-st" id="xlsx-st">Cargá el Excel para comenzar</span>
    <div class="sep-v"></div>
    <button class="btn btn-ghost" onclick="limpiarPrecios()">Limpiar precios</button>
  </div>

  <!-- TABLA ÚNICA -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="th-left">Ticker</th>
          <th class="th-left">Nombre</th>
          <th>Precio ASK</th>
          <th>Vencimiento</th>
          <th>Días</th>
          <th>M. Dur.</th>
          <th>TNA %</th>
          <th>TEA %</th>
          <th>Paridad %</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9" class="empty-state">Cargá el Excel para ver los instrumentos</td></tr>
      </tbody>
    </table>
  </div>

</div>
<script>
// ── CONSTANTES ────────────────────────────────────────────────
const WORKER_URL = 'https://yahoo-proxy.granda-fra.workers.dev';
const BCRA_BASE  = 'https://api.bcra.gob.ar/estadisticas/v3.0/monetarias';

// ── ESTADO ────────────────────────────────────────────────────
let instrumentos = []; // array plano ordenado: { grupo, ...datos }
let precios = {};
let bcraData = { cer: null, tamar: null };
let _precioTimer = {};

// ── GRUPOS (orden de aparición en tabla) ──────────────────────
const GRUPOS = [
  { key: 'lecap',    label: 'ARS Lecap'  },
  { key: 'tasafija', label: 'ARS Fijo'   },
  { key: 'cer',      label: 'ARS + CER'  },
  { key: 'tamar',    label: 'ARS Tamar'  },
];

// ── HELPERS FECHA ─────────────────────────────────────────────
function excelSerialToDate(serial) {
  if (!serial && serial !== 0) return null;
  const s = String(serial).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (/^\d+$/.test(s)) {
    const n = parseInt(s);
    const d = new Date(0);
    d.setUTCFullYear(1899, 11, 31);
    d.setUTCDate(d.getUTCDate() + n);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  return s;
}
function parseLocalDate(s) {
  if (!s) return null;
  const p = String(s).split('-').map(Number);
  return new Date(p[0], p[1]-1, p[2]);
}
function diasAlVenc(f) {
  if (!f) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const v = parseLocalDate(f);
  if (!v) return null;
  return Math.round((v - hoy) / 86400000);
}
function fmtDate(s) {
  if (!s) return '—';
  try {
    const d = parseLocalDate(s);
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(2)}`;
  } catch { return s; }
}
function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── STATUS / ALERT ────────────────────────────────────────────
function setStatus(e, t) {
  document.getElementById('dot').className = 'dot ' + e;
  document.getElementById('status-txt').textContent = t;
}
function showAlert(msg, tipo='err') {
  const el = document.getElementById('alert');
  el.textContent = msg; el.className = 'alert show ' + tipo;
  setTimeout(() => el.className = 'alert', 6000);
}

// ── LECAP: dias360 + VPV ──────────────────────────────────────
function dias360(emision, venc) {
  const e = parseLocalDate(emision), v = parseLocalDate(venc);
  let d1=e.getDate(), m1=e.getMonth()+1, y1=e.getFullYear();
  let d2=v.getDate(), m2=v.getMonth()+1, y2=v.getFullYear();
  if (d1===31) d1=30;
  if (d2===31 && d1>=30) d2=30;
  return (y2-y1)*360 + (m2-m1)*30 + (d2-d1);
}
function calcVPV(emision, venc, tem) {
  if (!emision || !venc || !tem) return null;
  const t = dias360(emision, venc) / 30;
  return 100 * Math.pow(1 + tem/100, t);
}

// ── TIR Newton-Raphson ────────────────────────────────────────
function calcTIR(flujos, precio) {
  if (!flujos?.length || !precio || precio <= 0) return null;
  let r = 0.10;
  for (let i = 0; i < 200; i++) {
    let vpn = -precio, dvpn = 0;
    for (const f of flujos) {
      const disc = Math.pow(1 + r, f.t);
      vpn  += f.monto / disc;
      dvpn -= f.t * f.monto / (disc * (1 + r));
    }
    if (Math.abs(dvpn) < 1e-12) break;
    const rNew = r - vpn / dvpn;
    if (Math.abs(rNew - r) < 1e-10) { r = rNew; break; }
    r = Math.max(rNew, -0.999);
  }
  return r; // TEA decimal
}

// ── Duration Modificada ───────────────────────────────────────
function calcMD(flujos, precio, tir_tea_dec) {
  if (!flujos?.length || !precio || tir_tea_dec === null) return null;
  let num = 0, den = 0;
  for (const f of flujos) {
    const d = f.monto / Math.pow(1 + tir_tea_dec, f.t);
    num += f.t * d; den += d;
  }
  if (!den) return null;
  return (num / den) / (1 + tir_tea_dec);
}

// ── CALCULOS POR TIPO ─────────────────────────────────────────
function calcMetricas(inst) {
  const precio = precios[inst.ticker] || null;
  const dias   = diasAlVenc(inst.venc);
  const hoy    = new Date(); hoy.setHours(0,0,0,0);

  if (inst.grupo === 'lecap') {
    const vpv = inst.vpv;
    if (!precio || !vpv || !dias) return { precio, dias, tna: null, tea: null, md: null, paridad: null };
    const tea_dec = Math.pow(vpv / precio, 365 / dias) - 1;
    const tea = tea_dec * 100;
    const tna = (Math.pow(1 + tea_dec, 1/365) - 1) * 365 * 100;
    const md  = (dias / 365) / (1 + tea_dec);
    return { precio, dias, tna, tea, md, paridad: null };
  }

  if (inst.grupo === 'tasafija') {
    const paridad = (precio && inst.vr) ? precio / inst.vr * 100 : null;
    if (!precio || !inst.flujos?.length) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const flujos = inst.flujos.map(f => {
      const fd = parseLocalDate(f.fecha);
      if (!fd) return null;
      const t = (fd - hoy) / (365.25 * 86400000);
      return t > 0 ? { t, monto: f.total } : null;
    }).filter(Boolean);
    if (!flujos.length) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const tir = calcTIR(flujos, precio);
    if (tir === null) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const tea = tir * 100;
    const tna = (Math.pow(1 + tir, 1/365) - 1) * 365 * 100;
    const md  = calcMD(flujos, precio, tir);
    return { precio, dias, tna, tea, md, paridad };
  }

  if (inst.grupo === 'cer') {
    const paridad = precio ? precio / 100 * 100 : null;
    if (!precio || !dias || dias <= 0) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const vencDate = parseLocalDate(inst.venc);
    const t = (vencDate - hoy) / (365.25 * 86400000);
    if (t <= 0) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const tir = calcTIR([{ t, monto: 100 }], precio);
    if (tir === null) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const tea = tir * 100;
    const tna = (Math.pow(1 + tir, 1/365) - 1) * 365 * 100;
    const md  = t / (1 + tir);
    return { precio, dias, tna, tea, md, paridad };
  }

  if (inst.grupo === 'tamar') {
    const paridad = precio ? precio / 100 * 100 : null;
    if (!precio || !dias || dias <= 0) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const vencDate = parseLocalDate(inst.venc);
    const t = (vencDate - hoy) / (365.25 * 86400000);
    if (t <= 0) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const tir = calcTIR([{ t, monto: 100 }], precio);
    if (tir === null) return { precio, dias, tna: null, tea: null, md: null, paridad };
    const tea = tir * 100;
    const tna = (Math.pow(1 + tir, 1/365) - 1) * 365 * 100;
    const md  = t / (1 + tir);
    return { precio, dias, tna, tea, md, paridad };
  }

  return { precio, dias, tna: null, tea: null, md: null, paridad: null };
}

// ── RENDER ────────────────────────────────────────────────────
function dash(n, dec=2, suffix='', cls='') {
  if (n === null || n === undefined || isNaN(n)) return '<span class="no-p">—</span>';
  return cls ? `<span class="${cls}">${n.toFixed(dec)}${suffix}</span>` : `${n.toFixed(dec)}${suffix}`;
}

function renderTabla() {
  const tbody = document.getElementById('tbody');
  if (!instrumentos.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Cargá el Excel para ver los instrumentos</td></tr>';
    return;
  }

  let html = '';
  let grupoActual = null;

  for (const inst of instrumentos) {
    // Header de grupo
    if (inst.grupo !== grupoActual) {
      grupoActual = inst.grupo;
      const label = GRUPOS.find(g => g.key === inst.grupo)?.label || inst.grupo;
      html += `<tr class="group-header"><td colspan="9">${label}</td></tr>`;
    }

    const m = calcMetricas(inst);
    const diasHtml = m.dias !== null
      ? `<span class="${m.dias < 30 ? 'val-red' : ''}">${m.dias}d</span>` : '—';

    html += `<tr class="data-row">
      <td class="td-ticker">${inst.ticker}</td>
      <td class="td-nombre">${inst.nombre || ''}</td>
      <td><input class="precio-cell-input${m.precio ? ' has-value' : ''}" id="inp-${inst.ticker}" type="number" step="0.01" placeholder="—" value="${m.precio ? m.precio.toFixed(2) : ''}" oninput="onPrecioChange('${inst.ticker}', this.value)"></td>
      <td>${fmtDate(inst.venc)}</td>
      <td>${diasHtml}</td>
      <td>${dash(m.md, 1)}</td>
      <td>${dash(m.tna, 2, '%', 'val-blue')}</td>
      <td>${dash(m.tea, 2, '%', 'val-green')}</td>
      <td>${dash(m.paridad, 1, '%', 'val-amber')}</td>
    </tr>`;
  }

  tbody.innerHTML = html;
}

// ── PARSER EXCEL ──────────────────────────────────────────────
function parsearExcel(buffer) {
  try {
    const wb = XLSX.read(buffer, { type: 'array' });
    const result = [];

    // LECAP
    if (wb.SheetNames.includes('LECAPS')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['LECAPS'], { defval: '', raw: true });
      rows.filter(r => String(r['Ticker']||'').trim()).forEach(r => {
        const emision = excelSerialToDate(r['Fecha Emision']);
        const venc    = excelSerialToDate(r['Fecha Vencimiento']);
        const tem     = parseFloat(r['TEM (%)']) || null;
        result.push({
          grupo: 'lecap',
          ticker: String(r['Ticker']).trim(),
          nombre: String(r['Tipo']||'LECAP').trim(),
          emision, venc, tem,
          vpv: calcVPV(emision, venc, tem),
        });
      });
    }

    // TASA FIJA
    if (wb.SheetNames.includes('TASA FIJA')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['TASA FIJA'], { defval: '', raw: true });
      const grupos = {};
      rows.forEach(r => {
        const ticker = String(r['Ticker']||'').trim();
        if (!ticker) return;
        if (!grupos[ticker]) grupos[ticker] = [];
        grupos[ticker].push({
          fecha: excelSerialToDate(r['Fecha']),
          vr:    parseFloat(r['Valor Residual']) || 0,
          renta: parseFloat(r['Renta'])          || 0,
          amort: parseFloat(r['Amortización'])   || 0,
          total: parseFloat(r['Total'])          || 0,
        });
      });
      Object.entries(grupos).forEach(([ticker, flujos]) => {
        flujos.sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));
        const venc = flujos[flujos.length-1]?.fecha;
        const vr   = flujos.find(f => f.vr > 0)?.vr || 100;
        result.push({
          grupo: 'tasafija',
          ticker,
          nombre: ticker,
          venc, vr,
          flujos: flujos.filter(f => f.total > 0),
        });
      });
    }

    // CER
    if (wb.SheetNames.includes('CER')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['CER'], { defval: '', raw: true });
      rows.filter(r => String(r['Ticker']||'').trim()).forEach(r => {
        result.push({
          grupo: 'cer',
          ticker: String(r['Ticker']).trim(),
          nombre: String(r['Tipo']||'CER').trim(),
          emision: excelSerialToDate(r['Fecha Emisión'] || r['Fecha Emision']),
          venc:    excelSerialToDate(r['Fecha Vencimineto'] || r['Fecha Vencimiento']),
          cer_aplicable: parseInt(r['CER aplicable']) || 10,
          margen: parseFloat(r['Margen']) || 0,
        });
      });
    }

    // TAMAR
    if (wb.SheetNames.includes('TAMAR')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['TAMAR'], { defval: '', raw: true });
      rows.filter(r => String(r['Ticker']||'').trim()).forEach(r => {
        let margen = r['Margen'];
        if (typeof margen === 'string') margen = parseFloat(margen.replace('%','').trim()) || 0;
        else margen = parseFloat(margen) || 0;
        if (margen < 1 && margen > 0) margen = margen * 100;
        result.push({
          grupo: 'tamar',
          ticker: String(r['Ticker']).trim(),
          nombre: String(r['Tipo']||'TAMAR').trim(),
          emision: excelSerialToDate(r['Fecha Emisión'] || r['Fecha Emision']),
          venc:    excelSerialToDate(r['Fecha Vencimineto'] || r['Fecha Vencimiento']),
          tamar_aplicable: parseInt(r['TAMAR aplicable']) || 10,
          margen,
        });
      });
    }

    // Ordenar por grupo (según GRUPOS) y dentro de cada grupo por días al vencimiento
    const grupoOrder = GRUPOS.map(g => g.key);
    result.sort((a,b) => {
      const gi = grupoOrder.indexOf(a.grupo) - grupoOrder.indexOf(b.grupo);
      if (gi !== 0) return gi;
      return (diasAlVenc(a.venc)||9999) - (diasAlVenc(b.venc)||9999);
    });

    instrumentos = result;

    const hora = new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    setStatus('ok', `${result.length} instrumentos · ${hora}`);
    renderTabla();
  } catch(e) {
    setStatus('err', 'Error parseando Excel');
    showAlert('Error al leer el Excel: ' + e.message);
    console.error(e);
  }
}

// ── FETCH PRECIOS YAHOO ───────────────────────────────────────
async function fetchPreciosYahoo() {
  if (!instrumentos.length) { showAlert('Primero cargá el Excel'); return; }
  const btn = document.getElementById('btn-yahoo');
  const stEl = document.getElementById('yahoo-st');
  btn.disabled = true;
  stEl.textContent = 'Consultando Yahoo Finance...';
  stEl.className = 'upload-st loading';
  setStatus('loading', 'Trayendo precios...');

  let ok = 0, err = 0;
  for (const inst of instrumentos) {
    try {
      const resp = await fetch(`${WORKER_URL}/?ticker=${inst.ticker}.BA`);
      const d = await resp.json();
      if (d.price && d.price > 0) {
        let p = d.price;
        if (p < 10) p = p * 100;
        precios[inst.ticker] = p;
        ok++;
      } else err++;
    } catch { err++; }
    await new Promise(r => setTimeout(r, 150));
  }

  renderTabla();
  const hora = new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
  stEl.textContent = `✓ ${ok} precios · ${hora}`;
  stEl.className = 'upload-st ok';
  setStatus('ok', `Precios actualizados · ${hora}`);
  if (err > 0) showAlert(`${err} tickers sin precio en Yahoo Finance`, 'err');
  btn.disabled = false;
}

function limpiarPrecios() {
  precios = {};
  document.getElementById('yahoo-st').textContent = '';
  document.getElementById('yahoo-st').className = 'upload-st';
  renderTabla();
}

function onPrecioChange(ticker, val) {
  clearTimeout(_precioTimer[ticker]);
  _precioTimer[ticker] = setTimeout(() => {
    const p = parseFloat(val);
    if (!p || isNaN(p) || p <= 0) delete precios[ticker];
    else precios[ticker] = p;
    renderTabla();
  }, 700);
}

function cargarExcelManual(input) {
  const file = input.files[0]; if (!file) return;
  document.getElementById('xlsx-st').textContent = 'Leyendo...';
  document.getElementById('xlsx-st').className = 'upload-st loading';
  setStatus('loading', 'Procesando Excel...');
  const reader = new FileReader();
  reader.onload = e => {
    parsearExcel(e.target.result);
    document.getElementById('xlsx-st').textContent = '✓ ' + file.name;
    document.getElementById('xlsx-st').className = 'upload-st ok';
  };
  reader.readAsArrayBuffer(file);
}
