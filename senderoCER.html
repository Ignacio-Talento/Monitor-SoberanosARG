<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow-x: auto; }

  .badge-confirmado { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }

<script>
const BCRA_URL  = 'https://indicadoresbcra.granda-fra.workers.dev';
const EXCEL_URL = 'Instrumentos.xlsx';

// Meses en español para el REM
const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let cerSerie   = {}; // { 'YYYY-MM-DD': valor }
let cerUltFecha = null; // última fecha publicada del CER
let inflInputs = {}; // { 'YYYY-MM': pct } expectativas de inflación
let bonosCER   = []; // instrumentos CER del Excel
let lecaps     = []; // instrumentos LECAP del Excel

// ── HELPERS ──────────────────────────────────────────────────
function parseLocalDate(s) {
  if (!s) return null;
  const parts = String(s).split('-').map(Number);
  return new Date(parts[0], parts[1] - 1, parts[2]);
}
function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDias(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}
function diasAlVenc(f) {
  if (!f) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  return Math.round((parseLocalDate(f) - hoy) / 86400000);
}
function fmtDate(s) {
  if (!s) return '—';
  try {
    const d = parseLocalDate(s);
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(2)}`;
  } catch { return s; }
}
function showAlert(msg, tipo='err') {
  const el = document.getElementById('alert');
  el.textContent = msg; el.className = 'alert show ' + tipo;
  setTimeout(() => el.className = 'alert', 6000);
}

// ── DIAS HABILES ─────────────────────────────────────────────
function restarDiasHabiles(fecha, n) {
  let d = parseLocalDate(fecha);
  let count = 0;
  while (count < n) {
    d.setDate(d.getDate() - 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return dateToStr(d);
}

// ── CARGAR CER DESDE BCRA ────────────────────────────────────
async function cargarCER() {
  try {
    const desde = '2020-01-01';
    const hasta = dateToStr(new Date());
    const resp = await fetch(`${BCRA_URL}/?serie=cer&desde=${desde}&hasta=${hasta}`);
    const json = await resp.json();
    const detalle = json.results?.[0]?.detalle || [];
    cerSerie = {};
    detalle.forEach(r => { cerSerie[r.fecha] = parseFloat(r.valor); });
    // Encontrar última fecha publicada
    const fechas = Object.keys(cerSerie).sort();
    cerUltFecha = fechas[fechas.length - 1];
    console.log(`CER cargado: ${fechas.length} datos, último: ${cerUltFecha} = ${cerSerie[cerUltFecha]}`);
  } catch(e) {
    showAlert('Error cargando CER del BCRA: ' + e.message);
  }
}

// ── OBTENER VALOR CER (REAL O PROYECTADO) ─────────────────────
function getCER(fecha) {
  if (!fecha) return null;
  
  // Si hay dato real, usarlo
  if (cerSerie[fecha]) return { valor: cerSerie[fecha], proyectado: false };
  
  // Buscar el dato real más cercano anterior
  const fechas = Object.keys(cerSerie).sort();
  const anteriores = fechas.filter(f => f <= fecha);
  if (!anteriores.length) return null;
  
  const ultimoReal = anteriores[anteriores.length - 1];
  let valorBase = cerSerie[ultimoReal];
  let fechaBase = parseLocalDate(ultimoReal);
  let fechaTarget = parseLocalDate(fecha);
  
  // Proyectar día a día usando el sendero de inflación
  let fechaActual = new Date(fechaBase);
  fechaActual.setDate(fechaActual.getDate() + 1);
  
  while (fechaActual <= fechaTarget) {
    const mesKey = `${fechaActual.getFullYear()}-${String(fechaActual.getMonth()+1).padStart(2,'0')}`;
    const inflMes = inflInputs[mesKey];
    if (inflMes !== undefined && inflMes !== null) {
      // Factor diario = (1 + inflMes/100)^(1/30)
      const factorDiario = Math.pow(1 + inflMes / 100, 1/30);
      valorBase *= factorDiario;
    }
    fechaActual.setDate(fechaActual.getDate() + 1);
  }
  
  return { valor: valorBase, proyectado: true };
}

// ── CARGAR REM ───────────────────────────────────────────────
async function cargarREM() {
  try {
    const resp = await fetch('Indicadores.xlsx?t=' + Date.now());
    if (!resp.ok) return;
    const buffer = await resp.arrayBuffer();
    const wb = XLSX.read(buffer, { type: 'array' });
    const ws = wb.Sheets['Indicadores'];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false, header: 1 });
    
    let remIdx = rows.findIndex(r => r[0] === 'REM');
    if (remIdx === -1) return;
    
    const headers = rows[remIdx + 1];
    const valores = rows[remIdx + 2];
    
    // Determinar el año/mes de cada columna del REM
    // El REM publica el mes en curso y los próximos 5 meses
    const ahora = new Date();
    
    headers.forEach((mes, i) => {
      if (!mes || mes === '12 Meses') return;
      const val = parseFloat(String(valores[i] || '').replace(',', '.'));
      if (isNaN(val)) return;
      
      // Buscar qué mes/año corresponde
      const mesIdx = MESES_ES.findIndex(m => mes.startsWith(m));
      if (mesIdx === -1) return;
      
      // Determinar el año — si el mes ya pasó en el año actual, es el próximo año
      let anio = ahora.getFullYear();
      if (mesIdx < ahora.getMonth()) anio++;
      
      const key = `${anio}-${String(mesIdx + 1).padStart(2,'0')}`;
      inflInputs[key] = val;
    });
    
    console.log('REM cargado:', inflInputs);
  } catch(e) {
    console.warn('Error cargando REM:', e);
  }
}

// ── RENDER INPUTS INFLACION ───────────────────────────────────
function renderInflInputs() {
  const grid = document.getElementById('infl-grid');
  const ahora = new Date();

  // ── Meses 1-6: datos del REM ──────────────────────────────
  const remMeses = Object.entries(inflInputs)
    .filter(([k]) => k !== '12m' && k !== 'anual')
    .sort(([a],[b]) => a.localeCompare(b))
    .slice(0, 6);

  const sumaREM6 = remMeses.reduce((s, [,v]) => s + (v||0), 0);
  const rem12 = inflInputs['12m'] || 24.2;

  // ── Meses 7-12: derivados del REM 12m ────────────────────
  const inflMeses712 = (rem12 - sumaREM6) / 6;

  // Guardar meses 7-12 en inflInputs
  for (let i = 6; i < 12; i++) {
    const d = new Date(ahora.getFullYear(), ahora.getMonth() + i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!inflInputs[key]) inflInputs[key] = parseFloat(inflMeses712.toFixed(2));
  }

  // ── Años 2+ hasta vencimiento más largo ──────────────────
  // Encontrar año de vencimiento más largo entre bonos CER
  const maxVenc = bonosCER.length ? bonosCER.reduce((max, b) => {
    if (!b.venc) return max;
    const y = parseInt(b.venc.split('-')[0]);
    return y > max ? y : max;
  }, ahora.getFullYear()) : ahora.getFullYear() + 3;

  const anioInicio = ahora.getFullYear() + 1;
  for (let y = anioInicio; y <= maxVenc; y++) {
    const key = `anio-${y}`;
    if (!inflInputs[key]) inflInputs[key] = parseFloat(rem12.toFixed(2));
  }

  // ── Render ────────────────────────────────────────────────
  let html = '';

  // Sección meses 1-6 (REM)
  html += `<div style="grid-column:1/-1;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);font-family:var(--mono);padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:4px">Datos REM (mensual %)</div>`;

  for (let i = 0; i < 6; i++) {
    const d = new Date(ahora.getFullYear(), ahora.getMonth() + i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const mesNombre = `${MESES_ES[d.getMonth()]} ${d.getFullYear()}`;
    const cerHastaDate = new Date(d.getFullYear(), d.getMonth() + 2, 15);
    const cerProyectado = getCER(dateToStr(cerHastaDate));
    const cerValStr = cerProyectado ? (cerProyectado.proyectado ? '~' : '') + cerProyectado.valor.toFixed(4) : '—';
    html += `<div class="infl-item">
      <div class="infl-lbl">${mesNombre}</div>
      <input class="infl-input" type="number" step="0.01" value="${inflInputs[key] ?? ''}" placeholder="% mensual" oninput="onInflChange('${key}', this.value)">
      <div class="infl-sublbl">→ CER hasta 15/${String(cerHastaDate.getMonth()+1).padStart(2,'0')}/${String(cerHastaDate.getFullYear()).slice(2)} · <span style="color:var(--navy);font-weight:600">${cerValStr}</span></div>
    </div>`;
  }

  // Sección meses 7-12 (derivados)
  html += `<div style="grid-column:1/-1;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);font-family:var(--mono);padding:12px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px">Meses 7-12 · derivado de REM 12m (${inflMeses712.toFixed(2)}% mensual)</div>`;

  for (let i = 6; i < 12; i++) {
    const d = new Date(ahora.getFullYear(), ahora.getMonth() + i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const mesNombre = `${MESES_ES[d.getMonth()]} ${d.getFullYear()}`;
    const cerHastaDate = new Date(d.getFullYear(), d.getMonth() + 2, 15);
    const cerProyectado = getCER(dateToStr(cerHastaDate));
    const cerValStr = cerProyectado ? (cerProyectado.proyectado ? '~' : '') + cerProyectado.valor.toFixed(4) : '—';
    html += `<div class="infl-item">
      <div class="infl-lbl">${mesNombre}</div>
      <input class="infl-input" type="number" step="0.01" value="${inflInputs[key] ?? inflMeses712.toFixed(2)}" placeholder="% mensual" oninput="onInflChange('${key}', this.value)" style="color:var(--blue);">
      <div class="infl-sublbl">→ CER hasta 15/${String(cerHastaDate.getMonth()+1).padStart(2,'0')}/${String(cerHastaDate.getFullYear()).slice(2)} · <span style="color:var(--navy);font-weight:600">${cerValStr}</span></div>
    </div>`;
  }

  // Sección anual (año 2+)
  html += `<div style="grid-column:1/-1;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);font-family:var(--mono);padding:12px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px">Proyección anual %</div>`;

  for (let y = anioInicio; y <= maxVenc; y++) {
    const key = `anio-${y}`;
    // CER proyectado para el 15/01 del año siguiente (fin del año)
    const cerAnioDate = new Date(y + 1, 0, 15);
    const cerAnioProy = getCER(dateToStr(cerAnioDate));
    const cerAnioStr = cerAnioProy ? (cerAnioProy.proyectado ? '~' : '') + cerAnioProy.valor.toFixed(4) : '—';
    html += `<div class="infl-item">
      <div class="infl-lbl">${y}</div>
      <input class="infl-input" type="number" step="0.1" value="${inflInputs[key] ?? rem12.toFixed(2)}" placeholder="% anual" oninput="onInflChange('${key}', this.value)" style="color:var(--text-2);">
      <div class="infl-sublbl">→ CER hasta 15/01/${String(y+1).slice(2)} · <span style="color:var(--navy);font-weight:600">${cerAnioStr}</span></div>
    </div>`;
  }

  grid.innerHTML = html;
}

function onInflChange(key, val) {
  const v = parseFloat(val);
  if (!isNaN(v)) inflInputs[key] = v;
  else delete inflInputs[key];
  clearTimeout(window._inflTimer);
  window._inflTimer = setTimeout(renderTabla, 600);
}

// ── CARGAR EXCEL ─────────────────────────────────────────────
function excelSerialToDate(v) {
  if (!v) return '';
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // M/D/YY o M/D/YYYY
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (mdy) {
    const y = mdy[3].length === 2 ? '20' + mdy[3] : mdy[3];
    return `${y}-${mdy[1].padStart(2,'0')}-${mdy[2].padStart(2,'0')}`;
  }
  // DD-MM-YY
  const dmy = s.match(/^(\d{1,2})-(\d{1,2})-(\d{2})$/);
  if (dmy) return `20${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
  // Serial numérico Excel
  if (/^\d+$/.test(s)) {
    const serial = parseInt(s);
    const d = new Date(0);
    d.setUTCFullYear(1899, 11, 31);
    d.setUTCDate(d.getUTCDate() + serial);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  return s;
}

async function cargarExcel() {
  try {
    const resp = await fetch(EXCEL_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const buffer = await resp.arrayBuffer();
    const wb = XLSX.read(buffer, { type: 'array' });

    // CER
    if (wb.SheetNames.includes('CER')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['CER'], { defval: '', raw: false });
      bonosCER = rows
        .filter(r => r['Ticker'] && String(r['Ticker']).trim())
        .map(r => ({
          ticker:  String(r['Ticker']).trim(),
          emision: excelSerialToDate(r['Fecha Emision'] || r['Fecha Emisión']),
          venc:    excelSerialToDate(r['Fecha Vencimineto'] || r['Fecha Vencimiento']),
          margen:  parseFloat(r['Margen']) || 0,
        }));
    }

    // LECAPS
    if (wb.SheetNames.includes('LECAPS')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['LECAPS'], { defval: '', raw: false });
      lecaps = rows
        .filter(r => r['Ticker'] && String(r['Ticker']).trim())
        .map(r => ({
          ticker:  String(r['Ticker']).trim(),
          emision: excelSerialToDate(r['Fecha Emision'] || r['Fecha Emisión']),
          venc:    excelSerialToDate(r['Fecha Vencimineto'] || r['Fecha Vencimiento']),
          tem:     parseFloat(r['TEM (%)']) || null,
        }))
        .filter(l => l.tem);
    }

    console.log(`Excel: ${bonosCER.length} bonos CER, ${lecaps.length} LECAPs`);
  } catch(e) {
    showAlert('Error cargando Excel: ' + e.message);
  }
}

// ── CALCULAR TIR NEWTON-RAPHSON ───────────────────────────────
function calcTIR(precio, vf, diasAlVenc) {
  // Para bono a descuento: precio × (1 + TIR)^t = VF
  // TIR = (VF/precio)^(1/t) - 1
  if (!precio || !vf || diasAlVenc <= 0) return null;
  const t = diasAlVenc / 365;
  return (Math.pow(vf / precio, 1 / t) - 1) * 100;
}

function parseLocalDate2(s) {
  if (!s) return null;
  const parts = String(s).split('-').map(Number);
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function dias360(emision, venc) {
  const e = parseLocalDate2(emision);
  const v = parseLocalDate2(venc);
  let d1 = e.getDate(), m1 = e.getMonth()+1, y1 = e.getFullYear();
  let d2 = v.getDate(), m2 = v.getMonth()+1, y2 = v.getFullYear();
  if (d1 === 31) d1 = 30;
  if (d2 === 31 && d1 >= 30) d2 = 30;
  return (y2-y1)*360 + (m2-m1)*30 + (d2-d1);
}

function calcVPV(emision, venc, tem) {
  if (!emision || !venc || !tem) return null;
  try {
    const diasBase = dias360(emision, venc);
    const t = diasBase / 30;
    return 100 * Math.pow(1 + tem/100, t);
  } catch { return null; }
}

function calcTEALecap(lecap, precio) {
  // Usar misma logica que el monitor: VPV con TEM y dias360
  if (!lecap.tem || !lecap.emision || !lecap.venc || !precio) return null;
  const vpv = calcVPV(lecap.emision, lecap.venc, lecap.tem);
  if (!vpv) return null;
  const dias = diasAlVenc(lecap.venc);
  if (!dias || dias <= 0) return null;
  const t = dias / 365;
  return (Math.pow(vpv / precio, 1/t) - 1) * 100;
}

// ── RENDER TABLA ─────────────────────────────────────────────
function renderTabla() {
  const tbody = document.getElementById('tbody-cer');
  if (!bonosCER.length) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--text-3);font-style:italic;font-family:var(--mono)">Cargando instrumentos...</td></tr>';
    return;
  }

  // Precio de cada bono CER (desde localStorage del monitor)
  const bonosData = JSON.parse(localStorage.getItem('bonos_data') || '[]');
  const precioMap = {};
  bonosData.filter(d => d.grupo === 'cer').forEach(d => { precioMap[d.ticker] = d.precio; });

  let html = '';

  bonosCER.forEach(bono => {
    const dias = diasAlVenc(bono.venc);
    if (dias === null || dias < 0) return;

    const precio = precioMap[bono.ticker] || null;

    // Fechas CER (10 días hábiles antes)
    const fechaCerEmision = bono.emision ? restarDiasHabiles(bono.emision, 10) : null;
    const fechaCerVenc    = bono.venc    ? restarDiasHabiles(bono.venc, 10)    : null;

    // Obtener valores CER
    const cerEmision = fechaCerEmision ? getCER(fechaCerEmision) : null;
    const cerVenc    = fechaCerVenc    ? getCER(fechaCerVenc)    : null;

    // Coeficiente de ajuste
    const coef = (cerEmision && cerVenc) ? cerVenc.valor / cerEmision.valor : null;

    // Estado: confirmado si ambos CER son reales
    const confirmado = cerEmision && cerVenc && !cerEmision.proyectado && !cerVenc.proyectado;
    const estadoBadge = confirmado
      ? '<span class="badge-confirmado">Tasa fija ✓</span>'
      : '<span class="badge-proyectado">Proyectado</span>';

    // Días hasta tasa fija: cuándo va a estar publicado el CER de vencimiento
    // El CER de vencimiento es 10 días hábiles antes del vencimiento
    // El BCRA publica el CER hasta el 15 del mes siguiente al mes de inflación publicado
    // Fecha en que el cerVenc va a estar publicado = fechaCerVenc + lag de publicación
    let diasTasaFija = null;
    if (!confirmado && fechaCerVenc) {
      // El CER hasta fecha X se publica el 15 del mes siguiente
      const fCV = parseLocalDate(fechaCerVenc);
      // Fecha de publicación = 15 del mes siguiente a fCV
      const fechaPublicacion = new Date(fCV.getFullYear(), fCV.getMonth() + 1, 15);
      const hoy2 = new Date(); hoy2.setHours(0,0,0,0);
      diasTasaFija = Math.round((fechaPublicacion - hoy2) / 86400000);
      if (diasTasaFija < 0) diasTasaFija = 0;
    }

    // Valor final = 100 × coeficiente
    const vf = coef ? 100 * coef : null;

    // TIR CER
    const tir = (precio && vf) ? calcTIR(precio, vf, dias) : null;

    // LECAP comparable (vencimiento más cercano, máx 10 días de diferencia)
    let lecapComp = null;
    let lecapTEA = null;
    let lecapDias = null;
    if (bono.venc) {
      const vencBono = parseLocalDate(bono.venc);
      lecapComp = lecaps.reduce((prev, curr) => {
        if (!curr.venc) return prev;
        const vencL = parseLocalDate(curr.venc);
        const diffCurr = Math.abs(vencL - vencBono) / 86400000;
        const diffPrev = prev ? Math.abs(parseLocalDate(prev.venc) - vencBono) / 86400000 : Infinity;
        return diffCurr < diffPrev ? curr : prev;
      }, null);

      if (lecapComp) {
        const diffDias = Math.abs((parseLocalDate(lecapComp.venc) - vencBono) / 86400000);
        if (diffDias > 20) {
          lecapComp = null; // No comparable
        } else {
          lecapDias = diasAlVenc(lecapComp.venc);
          const lecapPrecioData = bonosData.find(d => d.ticker === lecapComp.ticker);
          const lecapPrecio = lecapPrecioData ? lecapPrecioData.precio : null;
          lecapTEA = lecapPrecio ? calcTEALecap(lecapComp, lecapPrecio) : null;
        }
      }
    }

    // Spread en pb
    const spread = (tir !== null && lecapTEA !== null) ? (tir - lecapTEA) * 100 : null;

    html += `<tr>
      <td>${bono.ticker}</td>
      <td>${fmtDate(bono.venc)}</td>
      <td>${dias}d</td>
      <td>${cerEmision ? cerEmision.valor.toFixed(4) : '—'}</td>
      <td>${cerVenc ? cerVenc.valor.toFixed(4) + (cerVenc.proyectado ? ' *' : '') : '—'}</td>
      <td>${coef ? coef.toFixed(4) : '—'}</td>
      <td>${estadoBadge}</td>
      <td style="text-align:center;color:var(--text-2);font-family:var(--mono);font-size:12px">${confirmado ? '—' : diasTasaFija !== null ? diasTasaFija + 'd' : '—'}</td>
      <td class="val-blue">${tir !== null ? tir.toFixed(2) + '%' : precio ? '—' : '<span style="color:var(--text-3);font-style:italic;font-size:11px">Sin precio</span>'}</td>
      <td>${lecapComp ? lecapComp.ticker : '<span class="no-comp">Sin comparable</span>'}</td>
      <td class="val-blue">${lecapTEA !== null ? lecapTEA.toFixed(2) + '%' : '—'}</td>
      <td>${spread === null ? '—' : spread > 0 ? '<span class="badge-rec">CER</span>' : '<span class="badge-rec">LECAP</span>'}</td>
    </tr>`;
  });

  tbody.innerHTML = html || '<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--text-3);font-style:italic;font-family:var(--mono)">Sin datos</td></tr>';
}

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  await Promise.all([cargarCER(), cargarREM(), cargarExcel()]);
  renderInflInputs();
  renderTabla();
}

init();
</script>

</html>
