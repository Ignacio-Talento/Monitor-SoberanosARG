name: Actualizar Históricos de Precios
 
on:
  schedule:
    # 17:05 hora Argentina (UTC-3) = 20:05 UTC
    # Solo días de semana (lunes a viernes)
    - cron: '5 20 * * 1-5'
  workflow_dispatch: # Permite ejecución manual desde GitHub

permissions:
  contents: write
 
jobs:
  actualizar:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
 
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Instalar dependencias
        run: |
          pip install requests openpyxl
 
      - name: Ejecutar script de actualización
        env:
          API_1816_KEY: ${{ secrets.API_1816_KEY }}
        run: python actualizar_historicos.py
 
      - name: Commit y push si hay cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add historicos.xlsx
          git diff --staged --quiet || git commit -m "Actualizar historicos $(date +'%Y-%m-%d')"
          git push
